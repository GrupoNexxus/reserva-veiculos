<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reserva de Veículos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F5F3;color:#1a1a18;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #E8E8E4;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-size:15px;font-weight:600;color:#1a1a18;letter-spacing:-.02em}
.logo span{color:#3B6D11}
.tabs{display:flex}
.tab{padding:6px 14px;font-size:13px;cursor:pointer;color:#888;border:1px solid #E8E8E4;background:#F5F5F3;font-family:inherit}
.tab:first-child{border-radius:6px 0 0 6px}
.tab:last-child{border-radius:0 6px 6px 0;border-left:none}
.tab.active{background:#1a1a18;color:#fff;border-color:#1a1a18}
.main{max-width:960px;margin:0 auto;padding:24px 16px}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.month-nav{display:flex;align-items:center;gap:10px}
.month-nav button{background:#fff;border:1px solid #E8E8E4;color:#1a1a18;width:30px;height:30px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.month-nav button:hover{border-color:#aaa}
.month-title{font-size:16px;font-weight:600;min-width:160px;text-align:center;letter-spacing:-.02em}
.legend{display:flex;gap:16px;align-items:center}
.legend-item{display:flex;align-items:center;gap:6px;font-size:12px;color:#666}
.legend-dot{width:8px;height:8px;border-radius:50%}
.cal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cal-panel{background:#fff;border:1px solid #E8E8E4;border-radius:12px;overflow:hidden}
.cal-header{padding:12px 14px 10px;border-bottom:1px solid #F0F0EC;display:flex;align-items:center;gap:8px}
.cal-header-dot{width:8px;height:8px;border-radius:50%}
.cal-header-name{font-size:13px;font-weight:600;letter-spacing:-.01em}
.cal-header-count{margin-left:auto;font-size:11px;color:#888;background:#F5F5F3;padding:2px 7px;border-radius:99px}
.weekdays{display:grid;grid-template-columns:repeat(7,1fr);padding:6px 8px 0}
.wd{font-size:10px;color:#aaa;text-align:center;padding:3px 0;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.days{display:grid;grid-template-columns:repeat(7,1fr);padding:4px 8px 10px;gap:3px}
.day{min-height:48px;border-radius:7px;padding:5px 4px;cursor:pointer;position:relative;transition:background .12s;display:flex;flex-direction:column;align-items:center;gap:2px}
.day:hover:not(.empty){background:#F0F0EC}
.empty{cursor:default}
.weekend{background:#FAFAF8;cursor:pointer}
.day-num{font-size:11px;font-weight:500;color:#aaa;line-height:1}
.weekend .day-num{color:#aaa}
.day.booked-f5{background:#F0F7E6}
.day.booked-fortes{background:#FCEAEA}
.day.booked-f5 .day-num{color:#3B6D11;font-weight:600}
.day.booked-fortes .day-num{color:#A32D2D;font-weight:600}
.chip{font-size:9px;font-weight:500;border-radius:3px;padding:1px 4px;line-height:1.4;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center}
.chip-f5{background:#C0DD97;color:#27500A}
.chip-fortes{background:#F7C1C1;color:#791F1F}
.today-num{background:#1a1a18;color:#fff!important;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600}
.weekend-label{font-size:9px;color:#bbb;margin-top:1px}
.user-banner{background:#fff;border-bottom:1px solid #E8E8E4;padding:10px 24px;display:flex;align-items:center;gap:10px;font-size:13px}
.user-banner-label{color:#888;flex-shrink:0}
.user-banner-name{font-weight:600;color:#1a1a18;cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px}
.user-banner-name:hover{color:#3B6D11}
.user-banner-change{font-size:12px;color:#aaa;cursor:pointer;margin-left:4px}
.user-banner-change:hover{color:#555}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;opacity:0;pointer-events:none;transition:opacity .15s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:14px;padding:22px;width:100%;max-width:400px;transform:translateY(10px);transition:transform .15s;border:1px solid #E8E8E4}
.overlay.open .modal{transform:translateY(0)}
.modal-title{font-size:16px;font-weight:600;letter-spacing:-.02em;margin-bottom:2px}
.modal-sub{font-size:12px;color:#888;margin-bottom:16px}

/* Modal — visualização de reservas */
.res-card{background:#F5F5F3;border-radius:8px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.res-info{flex:1;min-width:0}
.res-nome{font-size:14px;font-weight:600;color:#1a1a18;margin-bottom:2px}
.res-dest{font-size:13px;color:#555;margin-bottom:2px}
.res-obs{font-size:12px;color:#aaa}
.res-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:20px;line-height:1;padding:2px 4px;flex-shrink:0;transition:color .12s;margin-top:-2px}
.res-del:hover{color:#E24B4A}
.res-actions{display:flex;flex-direction:column;align-items:center;gap:2px;flex-shrink:0}
.res-edit{background:none;border:none;color:#ccc;cursor:pointer;font-size:14px;line-height:1;padding:3px 4px;transition:color .12s}
.res-edit:hover{color:#378ADD}
.modal-empty{font-size:13px;color:#aaa;margin-bottom:14px}
.btn-add{width:100%;padding:9px;border:1.5px dashed #E8E8E4;border-radius:8px;background:none;font-size:13px;color:#888;cursor:pointer;font-family:inherit;transition:border-color .12s,color .12s;margin-top:4px}
.btn-add:hover{border-color:#aaa;color:#444}

/* Formulário inline */
.add-form{margin-top:12px;padding-top:12px;border-top:1px solid #F0F0EC}
.add-form-title{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px}
.field{margin-bottom:10px}
.field label{font-size:11px;font-weight:500;color:#888;display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em}
.field input{width:100%;border:1px solid #E8E8E4;border-radius:7px;padding:8px 10px;font-size:13px;color:#1a1a18;font-family:inherit;background:#FAFAF8;transition:border-color .12s}
.field input:focus{outline:none;border-color:#378ADD;background:#fff}
.field input.err{border-color:#E24B4A}
.btn-row{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.btn{padding:8px 16px;border-radius:7px;font-size:13px;cursor:pointer;border:none;font-family:inherit;font-weight:500;transition:background .12s}
.btn-primary{background:#1a1a18;color:#fff}
.btn-primary:hover{background:#333}
.btn-primary:disabled{background:#ccc;cursor:not-allowed}
.btn-ghost{background:#F5F5F3;color:#1a1a18;border:1px solid #E8E8E4}
.btn-ghost:hover{border-color:#aaa}
.btn-cancel-form{background:none;border:none;font-size:12px;color:#aaa;cursor:pointer;font-family:inherit;padding:0;margin-right:auto}
.btn-cancel-form:hover{color:#555}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a18;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;z-index:200;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err-toast{background:#A32D2D}

/* Loading */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#aaa;font-size:13px;gap:8px}
.spinner{width:16px;height:16px;border:2px solid #E8E8E4;border-top-color:#1a1a18;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Histórico */
.hist-section{margin-bottom:24px}
.hist-section-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.hist-section-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hist-section-title{font-size:13px;font-weight:600;letter-spacing:-.01em}
.hist-section-count{font-size:11px;color:#aaa;background:#F5F5F3;padding:2px 7px;border-radius:99px}
.hist-list{background:#fff;border:1px solid #E8E8E4;border-radius:12px;overflow:hidden}
.hist-item{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid #F5F5F3}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.hist-name{font-size:13px;font-weight:500}
.hist-detail{font-size:12px;color:#888}
.hist-meta{text-align:right;flex-shrink:0}
.hist-date{font-size:12px;color:#555;font-weight:500}
.hist-time{font-size:11px;color:#aaa;margin-top:1px}
.empty-state{text-align:center;padding:32px;color:#aaa;font-size:13px;background:#fff;border:1px solid #E8E8E4;border-radius:12px}

@media(max-width:600px){
  .cal-grid{grid-template-columns:1fr}
  .topbar{padding:0 14px}
  .main{padding:16px 10px}
  .day{min-height:40px}
  .legend{display:none}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Reservas <span>de Veículos</span></div>
    <div class="tabs">
      <button class="tab active" id="tab-cal" onclick="setTab('cal')">Calendário</button>
      <button class="tab" id="tab-hist" onclick="setTab('hist')">Histórico</button>
      <button class="tab" id="tab-audit" onclick="setTab('audit')">Auditoria</button>
    </div>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#3B6D11"></div>F5</div>
    <div class="legend-item"><div class="legend-dot" style="background:#A32D2D"></div>Fortes</div>
  </div>
</div>

<div id="user-banner" class="user-banner"></div>

<div class="main">
  <div id="view-cal">
    <div class="nav-row">
      <div class="month-nav">
        <button onclick="changeMonth(-1)">‹</button>
        <div class="month-title" id="month-title"></div>
        <button onclick="changeMonth(1)">›</button>
      </div>
    </div>
    <div class="cal-grid">
      <div class="cal-panel">
        <div class="cal-header">
          <div class="cal-header-dot" style="background:#3B6D11"></div>
          <div class="cal-header-name">F5</div>
          <div class="cal-header-count" id="count-f5">0 reservas</div>
        </div>
        <div class="weekdays" id="wd-f5"></div>
        <div class="days" id="days-f5"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
      </div>
      <div class="cal-panel">
        <div class="cal-header">
          <div class="cal-header-dot" style="background:#A32D2D"></div>
          <div class="cal-header-name">Fortes</div>
          <div class="cal-header-count" id="count-fortes">0 reservas</div>
        </div>
        <div class="weekdays" id="wd-fortes"></div>
        <div class="days" id="days-fortes"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
      </div>
    </div>
  </div>

  <div id="view-hist" style="display:none">
    <div id="hist-container"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
  </div>

  <div id="view-audit" style="display:none">
    <div id="audit-container"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL = 'https://iflmonwtnakebwxjtdor.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlmbG1vbnd0bmFrZWJ3eGp0ZG9yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEwMjMzNjAsImV4cCI6MjA5NjU5OTM2MH0.3R-Lz9cwbAw0oD3hDuTKNrGaTx0iBTkKbiCG3QGXebY';
const HEADERS = {'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'};
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

const USER_KEY = 'reservaf5_usuario';
function getUsuario(){ return localStorage.getItem(USER_KEY)||''; }
function setUsuario(n){ localStorage.setItem(USER_KEY, n); renderBanner(); }

function renderBanner(){
  const u=getUsuario();
  const el=document.getElementById('user-banner');
  if(!el) return;
  if(u){
    el.innerHTML=`<span class="user-banner-label">Você está como:</span>
      <span class="user-banner-name" onclick="promptUsuario()" title="Clique para alterar">${u}</span>
      <span class="user-banner-change" onclick="promptUsuario()">(alterar)</span>`;
  } else {
    el.innerHTML=`<span class="user-banner-label">⚠️ Identifique-se para registrar suas ações:</span>
      <span class="user-banner-name" onclick="promptUsuario()" style="color:#A32D2D">Clique aqui para informar seu nome</span>`;
  }
}

function promptUsuario(){
  const atual=getUsuario();
  const novo=prompt('Seu nome (como vai aparecer na auditoria):', atual||'');
  if(novo===null) return;
  if(!novo.trim()){ alert('Por favor informe um nome.'); return; }
  setUsuario(novo.trim());
}

async function logAuditoria(acao, reserva) {
  try {
    await api('auditoria', {
      method: 'POST',
      body: JSON.stringify({
        acao,
        veiculo: reserva.veiculo,
        data_viagem: reserva.data,
        nome: reserva.nome,
        destino: reserva.destino,
        obs: reserva.obs || '',
        feito_em: new Date().toISOString(),
        reserva_id: reserva.id || null,
        feito_por: reserva._feito_por || getUsuario()
      })
    });
  } catch(e) { /* auditoria nunca bloqueia a ação principal */ }
}

const SEED = {
  f5:[{data:'2026-06-01',nome:'Alessandro',destino:'Mucambo',obs:''}],
  fortes:[
    {data:'2026-06-02',nome:'César',destino:'Sobral',obs:''},
    {data:'2026-06-03',nome:'Elisama / Eduardo',destino:'Santa Quitéria',obs:''},
    {data:'2026-06-08',nome:'César',destino:'Sobral',obs:'Tarde'},
    {data:'2026-06-09',nome:'Elisama / Karyne / Alana / William',destino:'Hidrolândia / Nova Russas',obs:'FortesPay'},
    {data:'2026-06-10',nome:'Elisama / Karyne / Alana / William',destino:'Nova Russas / Crateús',obs:'FortesPay'},
    {data:'2026-06-11',nome:'Elisama / Karyne / Alana / William',destino:'Crateús',obs:'FortesPay'},
    {data:'2026-06-15',nome:'Jorge',destino:'Camocim',obs:''},
    {data:'2026-06-16',nome:'Jorge',destino:'Camocim',obs:''},
    {data:'2026-06-18',nome:'Walney / Eduardo',destino:'Meruoca',obs:''},
    {data:'2026-06-23',nome:'Elisama / Eduardo / Karina',destino:'Ibiapaba',obs:''},
    {data:'2026-06-24',nome:'Elisama / Eduardo / Karina',destino:'Ibiapaba',obs:''},
    {data:'2026-06-26',nome:'Elisama / Eduardo',destino:'Marco',obs:''}
  ]
};

let curYear=2026, curMonth=5, cache={}, seeded=false;
let modalState = {vid:null, key:null, d:null, showForm:false, editingId:null};

async function api(path, opts={}) {
  const r = await fetch(SB_URL+'/rest/v1/'+path, {headers:HEADERS,...opts});
  if(!r.ok){const t=await r.text();throw new Error(t);}
  if(r.status===204) return null;
  return r.json();
}

async function seedIfEmpty() {
  if(seeded) return; seeded=true;
  const existing = await api('reservas?select=id&limit=1');
  if(existing && existing.length>0) return;
  const rows=[];
  for(const [vid,items] of Object.entries(SEED)) for(const it of items) rows.push({veiculo:vid,...it});
  await api('reservas',{method:'POST',body:JSON.stringify(rows)});
}

async function fetchMonth(y,m) {
  const key=`${y}-${m}`;
  if(cache[key]) return cache[key];
  const from=`${y}-${String(m+1).padStart(2,'0')}-01`;
  const to=`${y}-${String(m+1).padStart(2,'0')}-${new Date(y,m+1,0).getDate()}`;
  const rows=await api(`reservas?data=gte.${from}&data=lte.${to}&order=data,criado_em`);
  cache[key]=rows||[]; return cache[key];
}

function invalidateCache(y,m){delete cache[`${y}-${m}`];}
function dateKey(y,m,d){return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
function isWeekend(y,m,d){const dow=new Date(y,m,d).getDay();return dow===0||dow===6;}

function groupByDay(rows){
  const map={};
  for(const r of rows){if(!map[r.data])map[r.data]=[];map[r.data].push(r);}
  return map;
}

function renderCalPanel(vid, rows) {
  const chipClass = vid==='f5'?'chip-f5':'chip-fortes';
  const bookedClass = vid==='f5'?'booked-f5':'booked-fortes';
  const map = groupByDay(rows.filter(r=>r.veiculo===vid));
  const count = rows.filter(r=>r.veiculo===vid).length;
  document.getElementById('count-'+vid).textContent = count+(count===1?' reserva':' reservas');
  const wds=['D','S','T','Q','Q','S','S'];
  document.getElementById('wd-'+vid).innerHTML=wds.map(w=>`<div class="wd">${w}</div>`).join('');
  const first=new Date(curYear,curMonth,1).getDay();
  const total=new Date(curYear,curMonth+1,0).getDate();
  const today=new Date();
  let html='';
  for(let i=0;i<first;i++) html+=`<div class="day empty"></div>`;
  for(let d=1;d<=total;d++){
    const key=dateKey(curYear,curMonth,d);
    const entries=map[key]||[];
    const booked=entries.length>0;
    const weekend=isWeekend(curYear,curMonth,d);
    const isToday=today.getFullYear()===curYear&&today.getMonth()===curMonth&&today.getDate()===d;
    let cls='day';
    if(weekend) cls+=' weekend';
    if(booked) cls+=' '+bookedClass;
    const numEl=isToday&&!weekend?`<div class="today-num">${d}</div>`:`<div class="day-num">${d}</div>`;
    let inner=numEl;
    entries.slice(0,2).forEach(e=>{
      inner+=`<div class="chip ${chipClass}" title="${e.nome}">${e.nome.split('/')[0].trim()}</div>`;
    });
    if(entries.length>2) inner+=`<div style="font-size:9px;color:#aaa">+${entries.length-2}</div>`;
    if(weekend) inner+=`<div class="weekend-label">${new Date(curYear,curMonth,d).getDay()===6?'Sáb':'Dom'}</div>`;
    html+=`<div class="${cls}" onclick="openDay('${vid}','${key}',${d})">${inner}</div>`;
  }
  document.getElementById('days-'+vid).innerHTML=html;
}

async function render() {
  document.getElementById('month-title').textContent=MONTHS[curMonth]+' '+curYear;
  document.getElementById('days-f5').innerHTML=`<div class="loading"><div class="spinner"></div>Carregando...</div>`;
  document.getElementById('days-fortes').innerHTML=`<div class="loading"><div class="spinner"></div>Carregando...</div>`;
  try{
    const rows=await fetchMonth(curYear,curMonth);
    renderCalPanel('f5',rows);
    renderCalPanel('fortes',rows);
  }catch(e){showToast('Erro ao carregar reservas',true);}
}

function changeMonth(dir){
  curMonth+=dir;
  if(curMonth>11){curMonth=0;curYear++;}
  if(curMonth<0){curMonth=11;curYear--;}
  render();
}

function openDay(vid, key, d) {
  modalState={vid,key,d,showForm:false,editingId:null};
  buildModal(false);
  document.getElementById('overlay').classList.add('open');
}

function buildModal(showForm) {
  const {vid,key,d}=modalState;
  const vLabel=vid==='f5'?'F5':'Fortes';
  const accentColor=vid==='f5'?'#3B6D11':'#A32D2D';
  const rows=cache[`${curYear}-${curMonth}`]||[];
  const entries=(groupByDay(rows.filter(r=>r.veiculo===vid))[key])||[];
  const dayName=new Date(curYear,curMonth,d).toLocaleDateString('pt-BR',{weekday:'long'});
  const dateStr=`${d} de ${MONTHS[curMonth]}`;

  document.getElementById('modal-title').innerHTML=`<span style="color:${accentColor}">${vLabel}</span> — ${dateStr}`;
  document.getElementById('modal-sub').textContent=dayName.charAt(0).toUpperCase()+dayName.slice(1);

  let html='';

  // Reservas existentes
  if(entries.length===0){
    html+=`<div class="modal-empty">Nenhuma reserva para este dia.</div>`;
  } else {
    entries.forEach(e=>{
      html+=`<div class="res-card">
        <div class="res-info">
          <div class="res-nome">${e.nome}</div>
          <div class="res-dest">📍 ${e.destino}</div>
          ${e.obs?`<div class="res-obs">${e.obs}</div>`:''}
          ${e.usuario?`<div class="res-obs" style="color:#bbb">Reservado por ${e.usuario}</div>`:''}
        </div>
        <div class="res-actions">
          <button class="res-edit" onclick="showEditForm('${e.id}')" title="Editar reserva">✎</button>
          <button class="res-del" onclick="deleteEntry('${e.id}')" title="Remover reserva">×</button>
        </div>
      </div>`;
    });
  }

  // Botão adicionar ou formulário (de adição ou edição)
  if(!showForm){
    html+=`<button class="btn-add" onclick="showAddForm()">+ Adicionar reserva</button>`;
  } else {
    const usuarioAtual=getUsuario();
    const editing = modalState.editingId ? entries.find(e=>e.id===modalState.editingId) : null;
    const formTitle = editing ? 'Editar reserva' : 'Nova reserva';
    const vNome = editing ? editing.nome : '';
    const vDest = editing ? editing.destino : '';
    const vObs = editing ? (editing.obs||'') : '';
    const vUsuario = editing ? (editing.usuario || usuarioAtual) : usuarioAtual;
    const saveLabel = editing ? 'Salvar alterações' : 'Salvar reserva';
    html+=`<div class="add-form">
      <div class="add-form-title">${formTitle}</div>
      <div class="field"><label>Quem está fazendo isso</label><input id="f-usuario" type="text" placeholder="Seu nome" value="${vUsuario}"/></div>
      <div class="field"><label>Nome / pessoas que vão</label><input id="f-nome" type="text" placeholder="Ex: João, Maria" value="${vNome}"/></div>
      <div class="field"><label>Destino</label><input id="f-dest" type="text" placeholder="Ex: Sobral" value="${vDest}"/></div>
      <div class="field"><label>Observação (opcional)</label><input id="f-obs" type="text" placeholder="Ex: FortesPay, tarde..." value="${vObs}"/></div>
      <div class="btn-row">
        <button class="btn-cancel-form" onclick="hideAddForm()">Cancelar</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveEntry()">${saveLabel}</button>
      </div>
    </div>`;
  }

  html+=`<div class="btn-row" style="margin-top:14px;padding-top:12px;border-top:1px solid #F0F0EC">
    <button class="btn btn-ghost" onclick="closeModal()">Fechar</button>
  </div>`;

  document.getElementById('modal-body').innerHTML=html;
  if(showForm) setTimeout(()=>{const el=document.getElementById('f-nome');if(el)el.focus();},80);
}

function showAddForm(){modalState.showForm=true;modalState.editingId=null;buildModal(true);}
function showEditForm(id){modalState.showForm=true;modalState.editingId=id;buildModal(true);}
function hideAddForm(){modalState.showForm=false;modalState.editingId=null;buildModal(false);}

async function saveEntry() {
  const usuario=document.getElementById('f-usuario').value.trim();
  const nome=document.getElementById('f-nome').value.trim();
  const destino=document.getElementById('f-dest').value.trim();
  const obs=document.getElementById('f-obs').value.trim();
  let ok=true;
  if(!usuario){document.getElementById('f-usuario').classList.add('err');ok=false;}
  if(!nome){document.getElementById('f-nome').classList.add('err');ok=false;}
  if(!destino){document.getElementById('f-dest').classList.add('err');ok=false;}
  if(!ok) return;
  setUsuario(usuario);
  const btn=document.getElementById('btn-save');
  const isEditing = !!modalState.editingId;
  btn.disabled=true; btn.textContent='Salvando...';
  try{
    if(isEditing){
      const id = modalState.editingId;
      await api(`reservas?id=eq.${id}`,{method:'PATCH',body:JSON.stringify({nome,destino,obs,usuario})});
      await logAuditoria('edicao', {veiculo:modalState.vid, data:modalState.key, nome, destino, obs, id, _feito_por:usuario});
      modalState.editingId=null;
    } else {
      const saved = await api('reservas',{method:'POST',body:JSON.stringify({veiculo:modalState.vid,data:modalState.key,nome,destino,obs,usuario,criado_em:new Date().toISOString()})});
      const savedRow = Array.isArray(saved) ? saved[0] : saved;
      await logAuditoria('cadastro', {veiculo:modalState.vid, data:modalState.key, nome, destino, obs, id: savedRow?.id, _feito_por:usuario});
    }
    invalidateCache(curYear,curMonth);
    const rows=await fetchMonth(curYear,curMonth);
    modalState.showForm=false;
    buildModal(false);
    renderCalPanel(modalState.vid,rows);
    document.getElementById('count-f5').textContent=rows.filter(r=>r.veiculo==='f5').length+' reservas';
    document.getElementById('count-fortes').textContent=rows.filter(r=>r.veiculo==='fortes').length+' reservas';
    showToast(isEditing?'Reserva atualizada!':'Reserva salva!');
  }catch(e){
    showToast('Erro ao salvar',true);
    btn.disabled=false; btn.textContent=isEditing?'Salvar alterações':'Salvar reserva';
  }
}

async function deleteEntry(id) {
  const usuario=getUsuario();
  if(!usuario){
    alert('Identifique-se antes de remover uma reserva. Clique no seu nome no topo da página.');
    return;
  }
  if(!confirm(`Remover esta reserva? Esta ação será registrada em seu nome (${usuario}).`)) return;
  try{
    const toDelete = await api(`reservas?id=eq.${id}&select=*`);
    const reserva = Array.isArray(toDelete) ? toDelete[0] : toDelete;
    await api(`reservas?id=eq.${id}`,{method:'DELETE'});
    if(reserva) await logAuditoria('exclusao', {...reserva, _feito_por: usuario});
    invalidateCache(curYear,curMonth);
    const rows=await fetchMonth(curYear,curMonth);
    buildModal(false);
    renderCalPanel(modalState.vid,rows);
    document.getElementById('count-f5').textContent=rows.filter(r=>r.veiculo==='f5').length+' reservas';
    document.getElementById('count-fortes').textContent=rows.filter(r=>r.veiculo==='fortes').length+' reservas';
    showToast('Reserva removida');
  }catch(e){showToast('Erro ao remover',true);}
}

function closeModal(){document.getElementById('overlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

async function renderHist() {
  document.getElementById('hist-container').innerHTML=`<div class="loading"><div class="spinner"></div>Carregando...</div>`;
  try{
    const rows=await api('reservas?order=data.desc,criado_em.desc&limit=500');
    if(!rows||rows.length===0){
      document.getElementById('hist-container').innerHTML=`<div class="empty-state">Nenhuma reserva registrada ainda.</div>`;
      return;
    }

    const vehicles=[
      {id:'f5',label:'F5',color:'#3B6D11',dotColor:'#3B6D11'},
      {id:'fortes',label:'Fortes',color:'#A32D2D',dotColor:'#A32D2D'}
    ];

    let html='';
    for(const v of vehicles){
      const vrows=rows.filter(r=>r.veiculo===v.id);
      html+=`<div class="hist-section">
        <div class="hist-section-header">
          <div class="hist-section-dot" style="background:${v.dotColor}"></div>
          <div class="hist-section-title">${v.label}</div>
          <div class="hist-section-count">${vrows.length} ${vrows.length===1?'reserva':'reservas'}</div>
        </div>`;

      if(vrows.length===0){
        html+=`<div class="empty-state">Nenhuma reserva para este veículo.</div>`;
      } else {
        html+=`<div class="hist-list">`;
        for(const r of vrows){
          const [y,m,d]=r.data.split('-').map(Number);
          const dateStr=new Date(y,m-1,d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
          let cadastradoStr='';
          if(r.criado_em){
            const dt=new Date(r.criado_em);
            const dCad=dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric',timeZone:'America/Fortaleza'});
            const hCad=dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Fortaleza'});
            cadastradoStr='Cadastrado em '+dCad+' às '+hCad;
          } else {
            cadastradoStr='Horário de cadastro indisponível';
          }
          html+=`<div class="hist-item">
            <div class="hist-dot" style="background:${v.dotColor}"></div>
            <div style="flex:1;min-width:0">
              <div class="hist-name">${r.nome} → ${r.destino}</div>
              <div class="hist-detail">${r.obs||''}</div>
            </div>
            <div class="hist-meta">
              <div class="hist-date">${dateStr}</div>
              <div class="hist-time">${cadastradoStr}</div>
            </div>
          </div>`;
        }
        html+=`</div>`;
      }
      html+=`</div>`;
    }

    document.getElementById('hist-container').innerHTML=html;
  }catch(e){
    document.getElementById('hist-container').innerHTML=`<div class="empty-state">Erro ao carregar histórico.</div>`;
  }
}

async function renderAudit() {
  document.getElementById('audit-container').innerHTML=`<div class="loading"><div class="spinner"></div>Carregando...</div>`;
  try{
    const rows=await api('auditoria?order=feito_em.desc&limit=500');
    if(!rows||rows.length===0){
      document.getElementById('audit-container').innerHTML=`<div class="empty-state">Nenhuma ação registrada ainda.<br>Cadastros e exclusões aparecerão aqui.</div>`;
      return;
    }
    let html='<div class="hist-list">';
    for(const r of rows){
      const isCad=r.acao==='cadastro';
      const color=r.veiculo==='f5'?'#3B6D11':'#A32D2D';
      const vLabel=r.veiculo==='f5'?'F5':'Fortes';
      const [y,m,d]=r.data_viagem.split('-').map(Number);
      const dataViagem=new Date(y,m-1,d).toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      let feitoEm='';
      if(r.feito_em){
        const dt=new Date(r.feito_em);
        const dF=dt.toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric',timeZone:'America/Fortaleza'});
        const hF=dt.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',timeZone:'America/Fortaleza'});
        feitoEm=dF+' às '+hF;
      }
      let acaoBadge;
      if(r.acao==='cadastro'){
        acaoBadge=`<span style="font-size:10px;font-weight:600;background:#EAF3DE;color:#3B6D11;padding:2px 7px;border-radius:99px">Cadastro</span>`;
      } else if(r.acao==='edicao'){
        acaoBadge=`<span style="font-size:10px;font-weight:600;background:#FAEEDA;color:#854F0B;padding:2px 7px;border-radius:99px">Edição</span>`;
      } else {
        acaoBadge=`<span style="font-size:10px;font-weight:600;background:#FCEAEA;color:#A32D2D;padding:2px 7px;border-radius:99px">Exclusão</span>`;
      }
      html+=`<div class="hist-item">
        <div class="hist-dot" style="background:${color}"></div>
        <div style="flex:1;min-width:0">
          <div class="hist-name" style="display:flex;align-items:center;gap:7px">${r.nome} → ${r.destino} ${acaoBadge}</div>
          <div class="hist-detail">${vLabel} · Viagem: ${dataViagem}${r.obs?' · '+r.obs:''}</div>
        </div>
        <div class="hist-meta">
          <div class="hist-time" style="text-align:right">${feitoEm||'—'}</div>
        </div>
      </div>`;
    }
    html+='</div>';
    document.getElementById('audit-container').innerHTML=html;
  }catch(e){
    document.getElementById('audit-container').innerHTML=`<div class="empty-state">Erro ao carregar auditoria.</div>`;
  }
}

function setTab(tab){
  document.getElementById('view-cal').style.display=tab==='cal'?'':'none';
  document.getElementById('view-hist').style.display=tab==='hist'?'':'none';
  document.getElementById('view-audit').style.display=tab==='audit'?'':'none';
  document.getElementById('tab-cal').classList.toggle('active',tab==='cal');
  document.getElementById('tab-hist').classList.toggle('active',tab==='hist');
  document.getElementById('tab-audit').classList.toggle('active',tab==='audit');
  if(tab==='hist') renderHist();
  if(tab==='audit') renderAudit();
}

let toastTimer;
function showToast(msg,err=false){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(err?' err-toast':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.className='toast';},2500);
}

(async()=>{
  renderBanner();
  try{await seedIfEmpty();}catch(e){}
  render();
})();
</script>
